steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_IMAGE}
      - .

  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}']

  # Public API service
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - api
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=ROLE=api,GCP_PROJECT=${PROJECT_ID},GCP_REGION=${_REGION},STORAGE_BUCKET=${_STORAGE_BUCKET},CLOUD_TASKS_QUEUE=ad-generation,WORKER_URL=${_WORKER_URL},TASKS_INVOKER_SA=${_TASKS_INVOKER_SA}
      - --set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,HIGGSFIELD_API_KEY=HIGGSFIELD_API_KEY:latest

  # Internal worker service (no public traffic)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - worker
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --set-env-vars=ROLE=worker,GCP_PROJECT=${PROJECT_ID},GCP_REGION=${_REGION},STORAGE_BUCKET=${_STORAGE_BUCKET},CLOUD_TASKS_QUEUE=ad-generation,TASKS_INVOKER_SA=${_TASKS_INVOKER_SA}
      - --set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,HIGGSFIELD_API_KEY=HIGGSFIELD_API_KEY:latest

substitutions:
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/megadon/api:${SHORT_SHA}
  _REGION: us-central1
  _STORAGE_BUCKET: ${PROJECT_ID}.appspot.com
  _WORKER_URL: https://worker-PLACEHOLDER.run.app
  _TASKS_INVOKER_SA: tasks-invoker@${PROJECT_ID}.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
