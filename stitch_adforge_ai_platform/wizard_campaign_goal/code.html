    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    /* AI Shimmer Effect */
    .ai-shimmer {
      position: relative;
      overflow: hidden;
    }
    .ai-shimmer::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent,
        rgba(79, 70, 229, 0.05),
        transparent
      );
      transform: rotate(45deg);
      animation: shimmer 4s infinite linear;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }
  </style>

<!-- Interactive Script for micro-interactions -->
<script>
    document.querySelectorAll('input[name="goal"]').forEach(input => {
      input.addEventListener('change', function() {
        // Clear all shimmer effects
        document.querySelectorAll('label > div').forEach(div => {
          div.classList.remove('ai-shimmer');
        });
        // Add shimmer to selected
        if(this.checked) {
          this.nextElementSibling.classList.add('ai-shimmer');
        }
      });
    });
  </script>
