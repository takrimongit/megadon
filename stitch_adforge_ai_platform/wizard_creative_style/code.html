<script>
        // Simple micro-interaction for radio selection
        document.querySelectorAll('input[name="creative_style"]').forEach(input => {
            input.addEventListener('change', (e) => {
                // Remove special styling from all
                document.querySelectorAll('.shimmer-border').forEach(el => {
                    el.classList.remove('shimmer-border', 'border-primary', 'ring-4', 'ring-primary/10');
                    el.classList.add('border-outline-variant/30');
                });
                
                // Add to selected
                if (e.target.checked) {
                    const card = e.target.closest('div');
                    card.classList.add('shimmer-border', 'border-primary', 'ring-4', 'ring-primary/10');
                    card.classList.remove('border-outline-variant/30');
                }
            });
        });
    </script>
